<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave a Review | JW Motors, Christchurch</title>
<meta name="description" content="Tell us how JW Motors did. Rate your experience with our Christchurch used car and servicing team." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="review-wrap">
  <div class="review-card">
    <a href="index.html" class="logo">JW<span class="dot">.</span>Motors</a>
    <h1>How did we do?</h1>
    <p>Tap a star to rate your experience with JW Motors.</p>
    <div class="star-pick" id="stars">
      <button data-v="1" aria-label="1 star">★</button>
      <button data-v="2" aria-label="2 stars">★</button>
      <button data-v="3" aria-label="3 stars">★</button>
      <button data-v="4" aria-label="4 stars">★</button>
      <button data-v="5" aria-label="5 stars">★</button>
    </div>
    <div class="star-label" id="label">&nbsp;</div>
    <p class="small">4–5 stars takes you to Google. 3 or fewer sends your feedback privately to the team.</p>
    <a href="index.html" class="back-link">← Back to site</a>
  </div>
</div>
<script>
  // Placeholder Google review link — replace with the live Google profile link.
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER/review";
  var labels = {1:"We'd like to put this right",2:"We'd like to put this right",3:"Tell us how to improve",4:"Great — thank you!",5:"Awesome — thank you!"};
  var label = document.getElementById("label");
  document.querySelectorAll("#stars button").forEach(function(btn){
    var v = parseInt(btn.dataset.v,10);
    btn.addEventListener("mouseenter", function(){ paint(v); label.textContent = labels[v]; });
    btn.addEventListener("click", function(){
      if (v >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
      else { window.location.href = "private.html?rating=" + v; }
    });
  });
  document.getElementById("stars").addEventListener("mouseleave", function(){ paint(0); label.innerHTML = "&nbsp;"; });
  function paint(n){
    document.querySelectorAll("#stars button").forEach(function(b){
      b.classList.toggle("lit", parseInt(b.dataset.v,10) <= n);
    });
  }
</script>
</body>
</html>
